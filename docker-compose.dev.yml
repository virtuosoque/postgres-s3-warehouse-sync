# Local-only stack. Source Postgres + metadata Postgres + LocalStack (S3 only) +
# Dagster + Gateway. No DynamoDB, no Glue, no KMS.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=10
        -c max_replication_slots=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 12

  metadata-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline_metadata
    volumes:
      - metadatadata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pipeline_metadata"]
      interval: 5s
      timeout: 3s
      retries: 12

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack:/var/lib/localstack

  bootstrap-s3:
    image: amazon/aws-cli:latest
    depends_on: [localstack]
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh
    command: -c "
      aws --endpoint-url=http://localstack:4566 s3 mb s3://viamedia-lake-raw &&
      aws --endpoint-url=http://localstack:4566 s3 mb s3://viamedia-lake-curated &&
      aws --endpoint-url=http://localstack:4566 s3 mb s3://viamedia-lake-gateway-results ||
      true"

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.extractor
    env_file: .env.dev
    depends_on:
      metadata-postgres:
        condition: service_healthy
    entrypoint: ["viamedia-migrate"]
    restart: "no"

  extractor:
    build:
      context: .
      dockerfile: docker/Dockerfile.extractor
    env_file: .env.dev
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      # LocalStack doesn't round-trip the CRC32 checksums that boto3 >=1.36
      # adds by default, which breaks PyIceberg's parquet reads on commit.
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    depends_on:
      postgres:
        condition: service_healthy
      metadata-postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      bootstrap-s3:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    ports:
      - "4000:4000"

  dagster:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster-webserver
    env_file: .env.dev
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      # Dev-only instance config: local compute logs instead of S3.
      - ./docker/dagster.dev.yaml:/app/dagster.yaml:ro
    depends_on: [extractor]
    ports:
      - "3000:3000"

  # Dequeues QueuedRunCoordinator runs and ticks schedules/sensors.
  daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster-webserver
    env_file: .env.dev
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./docker/dagster.dev.yaml:/app/dagster.yaml:ro
    command: ["dagster-daemon", "run", "-w", "/app/workspace.yaml"]
    depends_on:
      metadata-postgres:
        condition: service_healthy
      extractor:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    env_file: .env.dev
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      GATEWAY_DUCKDB_POOL_SIZE: "2"
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    depends_on:
      metadata-postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      bootstrap-s3:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

volumes:
  pgdata:
  metadatadata:
  localstack:
